version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: thelibrary-api
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./infrastructure:/app/infrastructure:ro
    restart: unless-stopped

volumes: {}
